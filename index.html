<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="每日康复">
<title>每日康复训练</title>
<link rel="stylesheet" href="styles/main.css">
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="header-left">
      <div class="header-label">Daily Program · Ankle · Spine · Upper</div>
      <div class="header-title">每日康复训练</div>
      <div class="header-sub" id="dateDisplay"></div>
    </div>
    <div class="streak-pill" onclick="openHistory()">
      <span class="streak-flame">🔥</span>
      <div>
        <div class="streak-num" id="streakNum">0</div>
        <div class="streak-label">连续天</div>
      </div>
    </div>
  </div>
  <div class="progress-bar-wrap">
    <div class="progress-bar-fill" id="progressBar" style="width:0%"></div>
  </div>
</div>

<div class="tabs">
  <button class="tab active-ankle" onclick="showSection('ankle', this)">🦶 右踝康复</button>
  <button class="tab" onclick="showSection('spine', this)">🌀 胸腰椎拉伸</button>
  <button class="tab" onclick="showSection('upper', this)">💪 上肢激活</button>
</div>

<div id="section-ankle" class="section"></div>
<div id="section-spine" class="section" style="display:none"></div>
<div id="section-upper" class="section" style="display:none"></div>

<div class="bottom-bar">
  <button class="checkin-btn" id="checkinBtn" onclick="doCheckin()">今日打卡 · 领取惊喜</button>
  <div class="checkin-sub" id="checkinSub"></div>
</div>

<div class="overlay" id="timerOverlay">
  <div class="timer-top">
    <div class="timer-label" id="timerSection">右踝康复</div>
    <div class="timer-name" id="timerName">动作名称</div>
    <div class="timer-sets-info" id="timerSetsInfo"></div>
    <div class="set-counter" id="setCounter"></div>
    <div class="timer-ring-wrap">
      <svg viewBox="0 0 200 200">
        <circle class="timer-ring-bg" cx="100" cy="100" r="88"/>
        <circle class="timer-ring-fg" id="timerRing" cx="100" cy="100" r="88"
          stroke="#38BDF8"
          stroke-dasharray="553"
          stroke-dashoffset="0"/>
      </svg>
      <div class="timer-count">
        <div class="timer-num" id="timerNum">—</div>
        <div class="timer-unit" id="timerUnitLabel">秒</div>
      </div>
    </div>
    <div class="timer-cue" id="timerCue"></div>
  </div>

  <div class="timer-scroll">
    <div class="variants-wrap" id="variantsWrap" style="display:none">
      <div class="variants-label">选择当前级别</div>
      <div id="variantsList"></div>
    </div>
    <div class="instructions-panel" id="instructionsPanel"></div>
  </div>

  <div class="timer-bottom">
    <div class="timer-btns">
      <button class="btn btn-secondary" onclick="closeTimer()">← 返回</button>
      <button class="btn btn-primary" id="timerMainBtn" onclick="toggleTimer()">开始</button>
    </div>
  </div>
</div>

<div class="overlay reward-overlay" id="rewardOverlay">
  <div class="reward-container">
    <div class="reward-stars">✦ &nbsp;✦ &nbsp;✦</div>
    <div class="reward-label" id="rewardStreakLabel">连续打卡 · 第 1 天</div>
    <div class="reward-card">
      <div class="reward-category" id="rewardCategory">—</div>
      <div class="reward-content" id="rewardContent"></div>
    </div>
    <div class="reward-note" id="rewardNote">今日已打卡 · 明日再见</div>
    <div class="reward-btns">
      <button class="btn btn-secondary" onclick="closeReward()">收起</button>
      <button class="btn btn-gold" onclick="openHistory()">收藏夹</button>
    </div>
  </div>
</div>

<div class="overlay" id="historyOverlay">
  <div class="reward-container">
    <div class="history-title">🏛 打卡收藏夹</div>
    <div class="history-sub" id="historyStatsText">0 天 · 0 份惊喜</div>
    <div class="streak-calendar" id="calendarDots"></div>
    <div class="history-list" id="historyList"></div>
    <div class="reward-btns" style="margin-top:20px">
      <button class="btn btn-secondary" onclick="closeHistory()">关闭</button>
    </div>
  </div>
</div>

<div class="overlay" id="addExerciseOverlay">
  <div class="form-container">
    <div class="form-title" id="formTitle">添加动作</div>
    <div class="form-sub" id="formSub">自定义你的康复动作</div>

    <div class="form-group">
      <label class="form-label">归入模块</label>
      <div class="form-radio-row" id="formModuleRow">
        <div class="form-radio" data-mod="ankle">🦶 右踝康复</div>
        <div class="form-radio" data-mod="spine">🌀 胸腰椎</div>
        <div class="form-radio" data-mod="upper">💪 上肢</div>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">动作名称</label>
      <input type="text" class="form-input" id="formName" placeholder="例如：单腿硬拉">
    </div>

    <div class="form-group">
      <label class="form-label">简短描述（卡片上显示）</label>
      <input type="text" class="form-input" id="formBrief" placeholder="例如：手持哑铃，身体前倾抬腿">
    </div>

    <div class="form-group">
      <label class="form-label">计时方式</label>
      <div class="form-radio-row" id="formTimerTypeRow">
        <div class="form-radio" data-type="reps">次数</div>
        <div class="form-radio" data-type="hold">秒数</div>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label class="form-label" id="formAmountLabel">每组次数</label>
        <input type="number" class="form-input" id="formAmount" placeholder="10" min="1">
      </div>
      <div class="form-group">
        <label class="form-label">总组数</label>
        <input type="number" class="form-input" id="formSets" placeholder="3" min="1" max="10">
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">标签（可选）</label>
      <input type="text" class="form-input" id="formBadge" placeholder="例如：右踝进阶">
    </div>

    <div class="form-group">
      <label class="form-label">起始姿势（可选）</label>
      <textarea class="form-textarea" id="formSetup" placeholder="描述开始时身体如何摆放"></textarea>
    </div>

    <div class="form-group">
      <label class="form-label">动作步骤（可选）</label>
      <textarea class="form-textarea" id="formSteps" placeholder="每步一行，按回车分隔"></textarea>
      <div class="form-helper">每步单独一行，按回车键换行</div>
    </div>

    <div class="form-group">
      <label class="form-label">关键提示（可选）</label>
      <textarea class="form-textarea" id="formCues" placeholder="每条一行，按回车分隔"></textarea>
    </div>

    <div class="form-group">
      <label class="form-label">呼吸配合（可选）</label>
      <input type="text" class="form-input" id="formBreath" placeholder="例如：发力时呼气">
    </div>

    <div class="reward-btns" style="margin-top:24px; gap:10px;">
      <button class="btn btn-secondary" onclick="closeAddExercise()">取消</button>
      <button class="btn delete-btn" id="formDeleteBtn" style="display:none" onclick="deleteCustomExercise()">删除</button>
      <button class="btn btn-gold" onclick="saveCustomExercise()">保存</button>
    </div>
  </div>
</div>

<script src="src/app.js"></script>
</body>
</html>
